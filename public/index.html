<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Texas Hold'em Friends</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <section id="login" class="panel login">
      <h1>Texas Hold'em Friends</h1>
      <p>Private friend rooms. Virtual chips only.</p>
      <input id="name" placeholder="Your name" maxlength="16" />
      <input id="customId" placeholder="Custom ID, e.g. @boss001" maxlength="18" />
      <div class="row">
        <button id="createBtn">Create Room</button>
      </div>
      <div class="joinBox">
        <input id="roomCode" placeholder="Room code" maxlength="5" />
        <button id="joinBtn">Join Room</button>
      </div>
      <p id="loginError" class="error"></p>
    </section>

    <section id="game" class="hidden">
      <header class="topbar">
        <div>
          <h2>Room <span id="code"></span></h2>
          <p id="message"></p>
        </div>
        <button id="startBtn">Start / Next Hand</button>
      </header>

      <section class="table">
        <div class="pot">Pot: <span id="pot">0</span></div>
        <div class="community" id="community"></div>
      </section>

      <section class="players" id="players"></section>

      <section class="actions panel">
        <div id="turnText">Waiting...</div>
        <div class="actionButtons">
          <button data-action="check">Check</button>
          <button data-action="call">Call</button>
          <button data-action="fold">Fold</button>
          <button data-action="allin">All-in</button>
        </div>
        <div class="raiseBox">
          <input id="raiseAmount" type="number" min="20" step="10" placeholder="Raise total bet to..." />
          <button data-action="raise">Raise</button>
        </div>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
