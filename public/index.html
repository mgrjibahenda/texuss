<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Texas Hold'em Premium</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    
<section id="login" class="loginScreen">
      <div class="loginShell">
        <div class="suitLogo"><span>♠</span><span>♥</span></div>
        <h1>TEXAS HOLD'EM</h1>
        <p class="subtitle">多人联机版</p>

        <div id="mainMenuPanel" class="loginPanel">
          <button id="createModeBtn" class="goldWide">创建房间</button>
          <button id="joinModeBtn" class="outlineWide">加入房间</button>
        </div>

        <div id="createPanel" class="loginPanel hidden">
          <label>你的名字</label>
          <input id="name" placeholder="输入名字..." maxlength="18" />
          <button id="createBtn" class="goldWide">创建并进入</button>
          <button id="backFromCreate" class="backBtn">← 返回</button>
        </div>

        <div id="joinPanel" class="loginPanel hidden">
          <label>房间号（4位）</label>
          <input id="roomCode" placeholder="A B C D" maxlength="5" />
          <label>你的名字</label>
          <input id="joinName" placeholder="输入名字..." maxlength="18" />
          <button id="joinBtn" class="goldWide">加入游戏</button>
          <button id="backFromJoin" class="backBtn">← 返回</button>
        </div>

        <p id="loginError" class="error"></p>
      </div>
    </section>

    <section id="game" class="game hidden">
      <header class="topbar">
        <div>
          <div class="eyebrow">Room <span id="code"></span></div>
          <h2 id="statusTitle">Waiting</h2>
          <p id="message"></p>
        </div>
        <div class="topActions"><button id="soundToggle" class="soundBtn">🔇 Sound</button><button id="nextHandBtn" class="primary hidden">Next Hand</button></div>
      </header>

      <section id="lobbyPanel" class="lobbyPanel hidden">
        <div class="lobbyHeader">
          <div>
            <h3>Stack setup</h3>
            <p>Dealer can set each player's chips before the hand starts.</p>
          </div>
          <div id="hostStartWrap"></div>
        </div>
        <div id="chipControls" class="chipControls"></div>
      </section>

      <section class="tableWrap">
        <div class="tableGlow"></div>
        <div class="pokerTable" id="pokerTable">
          <div class="centerBoard">
            <div class="potPill">Pot <span id="pot">0</span></div>
            <div id="community" class="community"></div>
            <div id="phasePill" class="phasePill">Lobby</div>
            <div id="handHint" class="handHint hidden"></div>
          </div>
          <div id="players" class="seats"></div>
        </div>
      </section>

      <section id="emoteBar" class="emoteBar hidden"></section>
      <section id="actionPanel" class="actionPanel hidden">
        <div id="turnText"></div>
        <div id="actionButtons" class="actionButtons"></div>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
